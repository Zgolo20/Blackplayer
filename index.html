<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="BlackPlayer">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="BlackPlayer — sleek offline music player">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<title>BlackPlayer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --surface:  #111111;
  --surface2: #181818;
  --border:   rgba(255,255,255,0.07);
  --accent:   #dc1e3c;
  --accent2:  #ff3b5c;
  --text:     #ffffff;
  --sub:      rgba(255,255,255,0.45);
  --muted:    rgba(255,255,255,0.22);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body { height: 100%; overscroll-behavior: none; }

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  padding: calc(16px + var(--safe-top)) 14px calc(16px + var(--safe-bottom));
  overflow-x: hidden;
  overflow-y: auto;
  user-select: none;
  -webkit-user-select: none;
  color: var(--text);
}

/* Subtle ambient glow at top */
body::before {
  content: '';
  position: fixed;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 300px;
  background: radial-gradient(ellipse, rgba(220,30,60,0.12) 0%, transparent 70%);
  pointer-events: none;
  transition: background 2s ease;
  z-index: 0;
}

/* Player */
.player {
  width: 100%; max-width: 390px;
  background: var(--surface);
  border-radius: 24px;
  border: 1px solid var(--border);
  box-shadow:
    0 40px 80px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 1px 0 rgba(255,255,255,0.06) inset;
  padding: 22px 22px 18px;
  position: relative;
  z-index: 10;
  animation: rise 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.bp-logo {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.bp-logo svg { display: block; }
.header-title {
  font-size: 15px; font-weight: 700;
  color: var(--text); letter-spacing: -0.2px;
}
.header-right { display: flex; align-items: center; gap: 8px; }

#installBtn {
  display: none;
  background: rgba(220,30,60,0.15);
  border: 1px solid rgba(220,30,60,0.3);
  border-radius: 10px;
  padding: 4px 10px;
  font-size: 11px; font-weight: 600;
  color: var(--accent2); cursor: pointer; letter-spacing: 0.3px;
  font-family: inherit;
  transition: background 0.2s;
}
#installBtn:hover { background: rgba(220,30,60,0.25); }

.more-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 3px; padding: 4px;
}
.more-btn span { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }

/* ── Art ── */
.art-container { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 22px; }

.art-glow {
  position: absolute; inset: 8%;
  border-radius: 16px;
  background: var(--accent);
  filter: blur(28px);
  opacity: 0.25;
  transform: translateY(6px);
  transition: background 1.8s ease, opacity 0.4s;
}

.art-frame {
  width: 100%; height: 100%;
  border-radius: 16px;
  overflow: hidden;
  position: relative; z-index: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.4s;
}
.art-frame.playing {
  transform: scale(1.035);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(220,30,60,0.2);
}
#artCanvas { width: 100%; height: 100%; display: block; }

/* ── Track info ── */
.track-info {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 10px;
}
.track-text { flex: 1; min-width: 0; }
.track-name {
  font-size: clamp(17px, 5vw, 21px);
  font-weight: 700; letter-spacing: -0.4px; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist {
  font-size: 14px; font-weight: 500;
  color: var(--sub); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.heart-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 8px; flex-shrink: 0;
  transition: color 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.heart-btn.liked { color: var(--accent2); }
.heart-btn:active { transform: scale(0.8); }

/* ── Progress ── */
.progress-section { margin-bottom: 16px; }

.progress-wrap {
  position: relative; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px; cursor: pointer;
  margin-bottom: 7px;
  touch-action: none;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  position: relative;
  transition: width 0.22s linear;
}
.progress-fill::after {
  content: '';
  position: absolute; right: -6px; top: 50%;
  transform: translateY(-50%) scale(0);
  width: 14px; height: 14px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: transform 0.18s;
}
.progress-wrap:hover .progress-fill::after,
.progress-wrap.dragging .progress-fill::after { transform: translateY(-50%) scale(1); }

.time-row {
  display: flex; justify-content: space-between;
  font-size: 11px; font-weight: 500;
  color: var(--muted); letter-spacing: 0.1px;
}

/* ── Main controls ── */
.main-controls {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}

.ctrl-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.75);
  display: flex; align-items: center; justify-content: center;
  padding: 8px; border-radius: 50%;
  transition: color 0.15s, transform 0.12s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.06); }
.ctrl-btn:active { transform: scale(0.85); }
.ctrl-btn.dim { color: var(--muted); }
.ctrl-btn.mode-on { color: var(--accent2); }

.play-btn {
  width: 58px; height: 58px;
  background: linear-gradient(145deg, var(--accent2), var(--accent));
  border-radius: 50%;
  color: #fff;
  box-shadow: 0 6px 22px rgba(220,30,60,0.45), 0 2px 6px rgba(0,0,0,0.3);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s !important;
}
.play-btn:hover {
  transform: scale(1.07) !important;
  box-shadow: 0 10px 32px rgba(220,30,60,0.55), 0 2px 8px rgba(0,0,0,0.3) !important;
}
.play-btn:active { transform: scale(0.91) !important; }

/* ── Volume ── */
.volume-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.vol-icon { color: var(--muted); flex-shrink: 0; }
.vol-track {
  flex: 1; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px; cursor: pointer;
  touch-action: none;
}
.vol-fill {
  height: 100%; border-radius: 2px;
  background: rgba(255,255,255,0.5);
}

/* ── Bottom row ── */
.bottom-row { display: flex; align-items: center; justify-content: space-between; }

.bottom-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  padding: 7px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  font-family: inherit;
  transition: color 0.2s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.bottom-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.bottom-btn.active { color: var(--text); }

.load-label {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.6); cursor: pointer; letter-spacing: 0.2px;
  font-family: inherit;
  transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.load-label:hover { background: rgba(255,255,255,0.1); color: var(--text); }
#fileInput { display: none; }

/* ── Queue ── */
.queue-panel {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s;
}
.queue-panel.open { max-height: 268px; opacity: 1; }

.queue-divider { height: 1px; background: var(--border); margin: 14px 0 10px; }

.queue-label {
  font-size: 11px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}

.queue-list { overflow-y: auto; max-height: 210px; }
.queue-list::-webkit-scrollbar { width: 0; }

.queue-item {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 6px; border-radius: 12px; cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.queue-item:hover { background: rgba(255,255,255,0.04); }
.queue-item:active { background: rgba(255,255,255,0.07); }
.queue-item.active { background: rgba(220,30,60,0.08); }

.qi-thumb {
  width: 36px; height: 36px; border-radius: 8px; overflow: hidden;
  flex-shrink: 0; background: var(--surface2);
  border: 1px solid var(--border);
}
.qi-thumb canvas { width: 36px; height: 36px; display: block; }
.qi-info { flex: 1; min-width: 0; }
.qi-title {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.queue-item.active .qi-title { color: var(--accent2); }
.qi-artist { font-size: 11px; color: var(--muted); margin-top: 1px; }
.qi-dur { font-size: 11px; color: var(--muted); flex-shrink: 0; }

/* EQ bars */
.eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; opacity: 0; flex-shrink: 0; }
.queue-item.active .eq-bars { opacity: 1; }
.eq-bar { width: 3px; border-radius: 1.5px; background: var(--accent2); height: 4px; }
.queue-item.active.is-playing .eq-bar { animation: eqBounce 0.5s ease infinite alternate; }
.eq-bar:nth-child(2) { animation-delay: 0.17s; }
.eq-bar:nth-child(3) { animation-delay: 0.34s; }
@keyframes eqBounce { from { height: 3px; } to { height: 14px; } }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(30,30,30,0.92);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 9px 18px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.88);
  opacity: 0;
  transition: opacity 0.28s, transform 0.28s;
  pointer-events: none; z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="player">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="bp-logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
      <span class="header-title">BlackPlayer</span>
    </div>
    <div class="header-right">
      <button id="installBtn">＋ Install</button>
      <div class="more-btn"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Art -->
  <div class="art-container">
    <div class="art-glow" id="artGlow"></div>
    <div class="art-frame" id="artFrame">
      <canvas id="artCanvas"></canvas>
    </div>
  </div>

  <!-- Track info -->
  <div class="track-info">
    <div class="track-text">
      <div class="track-name" id="trackName">No Track Loaded</div>
      <div class="track-artist" id="trackArtist">Tap "Add Music" to begin</div>
    </div>
    <button class="heart-btn" id="heartBtn" aria-label="Like">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path id="heartPath" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">—</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="main-controls">
    <button class="ctrl-btn dim" id="shuffleBtn" aria-label="Shuffle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 20L9 12l10-8v16z"/>
        <rect x="5" y="4" width="2.5" height="16" rx="1.2"/>
      </svg>
    </button>
    <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play/Pause">
      <svg id="playIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="Next">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M5 4l10 8-10 8V4z"/>
        <rect x="16.5" y="4" width="2.5" height="16" rx="1.2"/>
      </svg>
    </button>
    <button class="ctrl-btn dim" id="repeatBtn" aria-label="Repeat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
  </div>

  <!-- Volume -->
  <div class="volume-row">
    <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
    <div class="vol-track" id="volTrack"><div class="vol-fill" id="volFill" style="width:80%"></div></div>
    <svg class="vol-icon" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Bottom -->
  <div class="bottom-row">
    <button class="bottom-btn" id="queueToggle">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6" r="1" fill="currentColor"/>
        <circle cx="3" cy="12" r="1" fill="currentColor"/>
        <circle cx="3" cy="18" r="1" fill="currentColor"/>
      </svg>
      Queue
    </button>

    <label class="load-label" for="fileInput">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Add Music
    </label>
    <input type="file" id="fileInput" accept="audio/*" multiple>

    <button class="bottom-btn" id="eqBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
        <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
        <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
        <line x1="17" y1="16" x2="23" y2="16"/>
      </svg>
      EQ
    </button>
  </div>

  <!-- Queue panel -->
  <div class="queue-panel" id="queuePanel">
    <div class="queue-divider"></div>
    <div class="queue-label">Up Next</div>
    <div class="queue-list" id="queueList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Service Worker ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] Registered:', r.scope))
      .catch(e => console.warn('[SW] Error:', e))
  );
}

// ── PWA Install ─────────────────────────────────────────
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = 'none';
  if (outcome === 'accepted') showToast('BlackPlayer installed ✓');
});
window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
  showToast('BlackPlayer installed ✓');
});

// ── State ────────────────────────────────────────────────
const audio = new Audio();
audio.volume = 0.8;

let tracks = [], currentIndex = 0;
let isShuffled = false, repeatMode = 0;
let audioCtx, sourceNode, analyserNode;
let artPhase = 0;

// Color palettes (dark, rich — suits black theme)
const palettes = [
  ['#dc1e3c','#ff6b35'],
  ['#7c3aed','#dc1e3c'],
  ['#0891b2','#7c3aed'],
  ['#059669','#0891b2'],
  ['#d97706','#dc1e3c'],
  ['#be185d','#7c3aed'],
  ['#1d4ed8','#0891b2'],
  ['#dc2626','#9333ea'],
];

// ── Palette apply ───────────────────────────────────────
function setPalette(idx) {
  const [c1] = palettes[idx % palettes.length];
  document.getElementById('artGlow').style.background = c1;
  // Update body glow via CSS variable
  document.body.style.setProperty('--accent', c1);
}
setPalette(0);

// ── Art canvas ──────────────────────────────────────────
const artCanvas = document.getElementById('artCanvas');
const artCtx = artCanvas.getContext('2d');

function drawArt() {
  const W = artCanvas.offsetWidth || 346;
  artCanvas.width = W; artCanvas.height = W;
  const t = artPhase;
  const [c1, c2] = palettes[currentIndex % palettes.length];
  const isPlaying = !audio.paused;

  // Deep black base
  artCtx.fillStyle = '#0d0d0d';
  artCtx.fillRect(0, 0, W, W);

  // Radial blobs
  const blobs = [
    { x: 0.35, y: 0.35, r: 0.42, c: c1, phase: 0 },
    { x: 0.65, y: 0.6,  r: 0.38, c: c2, phase: 1.4 },
  ];
  for (const b of blobs) {
    const cx = W * b.x + (isPlaying ? Math.sin(t * 0.5 + b.phase) * W * 0.04 : 0);
    const cy = W * b.y + (isPlaying ? Math.cos(t * 0.4 + b.phase) * W * 0.03 : 0);
    const r  = W * b.r  + (isPlaying ? Math.sin(t * 0.7 + b.phase) * W * 0.03 : 0);
    const grad = artCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, b.c + '44');
    grad.addColorStop(1, 'transparent');
    artCtx.fillStyle = grad;
    artCtx.beginPath();
    artCtx.arc(cx, cy, r, 0, Math.PI * 2);
    artCtx.fill();
  }

  // Subtle grid
  artCtx.strokeStyle = 'rgba(255,255,255,0.025)';
  artCtx.lineWidth = 1;
  for (let x = 0; x < W; x += 36) {
    artCtx.beginPath(); artCtx.moveTo(x, 0); artCtx.lineTo(x, W); artCtx.stroke();
  }
  for (let y = 0; y < W; y += 36) {
    artCtx.beginPath(); artCtx.moveTo(0, y); artCtx.lineTo(W, y); artCtx.stroke();
  }

  // Center play / note icon
  const cx2 = W / 2, cy2 = W / 2;
  artCtx.save();
  artCtx.translate(cx2, cy2);
  if (isPlaying) artCtx.rotate(Math.sin(t * 0.22) * 0.05);
  if (isPlaying) {
    // Pulsing ring
    const pulse = 0.28 + Math.sin(t * 2) * 0.04;
    artCtx.beginPath();
    artCtx.arc(0, 0, W * pulse, 0, Math.PI * 2);
    artCtx.strokeStyle = 'rgba(255,255,255,0.06)';
    artCtx.lineWidth = 2;
    artCtx.stroke();
  }
  artCtx.fillStyle = 'rgba(255,255,255,0.85)';
  artCtx.font = `bold ${Math.floor(W * 0.2)}px -apple-system`;
  artCtx.textAlign = 'center';
  artCtx.textBaseline = 'middle';
  artCtx.fillText(isPlaying ? '♫' : '♪', 0, 0);
  artCtx.restore();

  if (isPlaying) artPhase += 0.016;
  requestAnimationFrame(drawArt);
}
drawArt();

// ── Audio context ───────────────────────────────────────
function setupAudioCtx() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceNode = audioCtx.createMediaElementSource(audio);
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;
  sourceNode.connect(analyserNode);
  analyserNode.connect(audioCtx.destination);
}

// ── File loading ────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const wasEmpty = !tracks.length;
  tracks = [...tracks, ...files.map(f => ({
    url: URL.createObjectURL(f),
    title: f.name.replace(/\.[^.]+$/, ''),
    artist: 'Local File',
    duration: '—'
  }))];
  if (wasEmpty) loadTrack(0);
  renderQueue();
  showToast(`${files.length} track${files.length > 1 ? 's' : ''} added`);
  e.target.value = '';
});

function loadTrack(idx) {
  if (!tracks.length) return;
  currentIndex = ((idx % tracks.length) + tracks.length) % tracks.length;
  const t = tracks[currentIndex];
  audio.src = t.url;
  audio.load();
  document.getElementById('trackName').textContent = t.title;
  document.getElementById('trackArtist').textContent = t.artist;
  document.getElementById('currentTime').textContent = '0:00';
  document.getElementById('duration').textContent = t.duration !== '—' ? t.duration : '—';
  document.getElementById('progressFill').style.width = '0%';
  setPalette(currentIndex);
  renderQueue();
  audio.addEventListener('loadedmetadata', () => {
    const d = fmt(audio.duration);
    tracks[currentIndex].duration = d;
    document.getElementById('duration').textContent = d;
    renderQueue();
  }, { once: true });
}

// ── Playback ────────────────────────────────────────────
function playPause() {
  if (!tracks.length) { showToast('Add music first'); return; }
  setupAudioCtx();
  audio.paused ? audio.play() : audio.pause();
}

audio.addEventListener('play', () => {
  document.getElementById('playIcon').innerHTML =
    '<rect x="6" y="4" width="4" height="16" rx="1.5"/><rect x="14" y="4" width="4" height="16" rx="1.5"/>';
  document.getElementById('artFrame').classList.add('playing');
  renderQueue();
  updateMediaSession();
});

audio.addEventListener('pause', () => {
  document.getElementById('playIcon').innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  document.getElementById('artFrame').classList.remove('playing');
  renderQueue();
});

audio.addEventListener('timeupdate', () => {
  document.getElementById('currentTime').textContent = fmt(audio.currentTime);
  if (audio.duration) {
    document.getElementById('progressFill').style.width =
      (audio.currentTime / audio.duration * 100) + '%';
  }
});

audio.addEventListener('ended', () => {
  if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
  const next = isShuffled
    ? Math.floor(Math.random() * tracks.length)
    : (currentIndex + 1) % tracks.length;
  if (repeatMode === 1 || currentIndex < tracks.length - 1 || isShuffled) {
    loadTrack(next); audio.play();
  }
});

// ── Controls ────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', playPause);

document.getElementById('prevBtn').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  loadTrack(currentIndex - 1);
  if (!audio.paused) { setupAudioCtx(); audio.play(); }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  loadTrack(isShuffled ? Math.floor(Math.random() * tracks.length) : currentIndex + 1);
  if (!audio.paused) { setupAudioCtx(); audio.play(); }
});

document.getElementById('shuffleBtn').addEventListener('click', function() {
  isShuffled = !isShuffled;
  this.classList.toggle('mode-on', isShuffled);
  this.classList.toggle('dim', !isShuffled);
  showToast(isShuffled ? 'Shuffle on' : 'Shuffle off');
});

document.getElementById('repeatBtn').addEventListener('click', function() {
  repeatMode = (repeatMode + 1) % 3;
  this.classList.toggle('mode-on', repeatMode > 0);
  this.classList.toggle('dim', repeatMode === 0);
  showToast(['Repeat off','Repeat all','Repeat one'][repeatMode]);
});

document.getElementById('heartBtn').addEventListener('click', function() {
  this.classList.toggle('liked');
  const p = document.getElementById('heartPath');
  if (this.classList.contains('liked')) {
    p.setAttribute('fill','#ff3b5c'); p.setAttribute('stroke','#ff3b5c');
    showToast('Added to favourites');
  } else {
    p.setAttribute('fill','none'); p.setAttribute('stroke','currentColor');
  }
});

document.getElementById('queueToggle').addEventListener('click', function() {
  document.getElementById('queuePanel').classList.toggle('open');
  this.classList.toggle('active');
});

document.getElementById('eqBtn').addEventListener('click', () => showToast('EQ coming soon'));

// ── Progress seek ───────────────────────────────────────
const progressWrap = document.getElementById('progressWrap');
function seekTo(e) {
  if (!audio.duration) return;
  const r = progressWrap.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  audio.currentTime = Math.max(0, Math.min(1, x / r.width)) * audio.duration;
}
progressWrap.addEventListener('click', seekTo);
progressWrap.addEventListener('touchstart', e => { progressWrap.classList.add('dragging'); seekTo(e); }, { passive: true });
progressWrap.addEventListener('touchmove', seekTo, { passive: true });
progressWrap.addEventListener('touchend', () => progressWrap.classList.remove('dragging'));

// ── Volume ───────────────────────────────────────────────
const volTrack = document.getElementById('volTrack');
function setVol(e) {
  const r = volTrack.getBoundingClientRect();
  const v = Math.max(0, Math.min(1, ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) / r.width));
  audio.volume = v;
  document.getElementById('volFill').style.width = (v * 100) + '%';
}
volTrack.addEventListener('click', setVol);
volTrack.addEventListener('touchstart', setVol, { passive: true });
volTrack.addEventListener('touchmove', setVol, { passive: true });

// ── Queue render ────────────────────────────────────────
function renderQueue() {
  const list = document.getElementById('queueList');
  list.innerHTML = '';
  tracks.forEach((t, i) => {
    const isActive  = i === currentIndex;
    const isPlaying = isActive && !audio.paused;
    const item = document.createElement('div');
    item.className = 'queue-item' + (isActive ? ' active' : '') + (isPlaying ? ' is-playing' : '');
    item.innerHTML = `
      <div class="qi-thumb"><canvas id="qt-${i}" width="36" height="36"></canvas></div>
      <div class="qi-info">
        <div class="qi-title">${esc(t.title)}</div>
        <div class="qi-artist">${esc(t.artist)}</div>
      </div>
      ${isActive
        ? `<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>`
        : `<span class="qi-dur">${t.duration}</span>`}
    `;
    item.addEventListener('click', () => { loadTrack(i); setupAudioCtx(); audio.play(); });
    list.appendChild(item);

    requestAnimationFrame(() => {
      const c = document.getElementById(`qt-${i}`);
      if (!c) return;
      const ctx = c.getContext('2d');
      const [c1, c2] = palettes[i % palettes.length];
      ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0,0,36,36);
      const g = ctx.createRadialGradient(18,18,0,18,18,22);
      g.addColorStop(0, c1+'88'); g.addColorStop(1, c2+'44');
      ctx.fillStyle = g; ctx.fillRect(0,0,36,36);
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.font = 'bold 16px -apple-system';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('♪', 18, 18);
    });
  });
}

// ── Media Session ────────────────────────────────────────
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !tracks.length) return;
  const t = tracks[currentIndex];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: t.title, artist: t.artist, album: 'BlackPlayer'
  });
  navigator.mediaSession.setActionHandler('play',          () => audio.play());
  navigator.mediaSession.setActionHandler('pause',         () => audio.pause());
  navigator.mediaSession.setActionHandler('previoustrack', () => { loadTrack(currentIndex-1); audio.play(); });
  navigator.mediaSession.setActionHandler('nexttrack',     () => { loadTrack(currentIndex+1); audio.play(); });
}

// ── Toast ────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Helpers ──────────────────────────────────────────────
function fmt(s) {
  if (!isFinite(s)) return '0:00';
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
