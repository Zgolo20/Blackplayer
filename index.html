<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BlackPlayer">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="BlackPlayer — sleek offline music player">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<title>BlackPlayer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --card:    #111;
  --card2:   #181818;
  --border:  rgba(255,255,255,0.07);
  --accent:  #dc1e3c;
  --accent2: #ff3b5c;
  --text:    #fff;
  --sub:     rgba(255,255,255,0.45);
  --muted:   rgba(255,255,255,0.22);
  --st: env(safe-area-inset-top,    0px);
  --sb: env(safe-area-inset-bottom, 0px);
  --sl: env(safe-area-inset-left,   0px);
  --sr: env(safe-area-inset-right,  0px);
}

html { height: 100%; }

body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: -apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--text);
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column;
}

/* Ambient blobs */
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.amb-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18; transition: background 2s ease; }
.amb1 { width: 70vw; height: 70vw; top: -20vw; left: -10vw; background: #dc1e3c; }
.amb2 { width: 60vw; height: 60vw; bottom: -15vw; right: -10vw; background: #7c3aed; }

/* Full-screen shell */
.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
  padding:
    calc(var(--st) + 14px)
    calc(var(--sr) + 18px)
    calc(var(--sb) + 14px)
    calc(var(--sl) + 18px);
  overflow: hidden;
  justify-content: space-between;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; margin-bottom: 10px;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.bp-logo {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
}
.header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.header-right { display: flex; align-items: center; gap: 8px; }

#installBtn {
  display: none;
  background: rgba(220,30,60,0.15); border: 1px solid rgba(220,30,60,0.3);
  border-radius: 10px; padding: 4px 10px;
  font-size: 11px; font-weight: 600; font-family: inherit;
  color: var(--accent2); cursor: pointer; transition: background 0.2s;
}
#installBtn:hover { background: rgba(220,30,60,0.25); }
.more-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 3px; padding: 4px; }
.more-btn span { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }

/* Art — capped height so controls always have room */
.art-container { position: relative; flex: 0 0 auto; height: min(42vh, 340px); margin-bottom: 10px; }
.art-glow {
  position: absolute; inset: 8%; border-radius: 16px;
  background: var(--accent); filter: blur(32px); opacity: 0.28;
  transform: translateY(6px); transition: background 1.8s ease;
}
.art-frame {
  width: 100%; height: 100%; border-radius: 16px; overflow: hidden;
  background: var(--card2); border: 1px solid var(--border);
  position: relative; z-index: 1;
  transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.4s;
}
.art-frame.playing {
  transform: scale(1.025);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(220,30,60,0.18);
}
#artCanvas { width: 100%; height: 100%; display: block; }

/* Bottom section */
.bottom-section { flex-shrink: 0; }

.track-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
.track-text { flex: 1; min-width: 0; }
.track-name {
  font-size: clamp(18px, 5vw, 22px); font-weight: 700;
  letter-spacing: -0.4px; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist {
  font-size: 14px; font-weight: 500; color: var(--sub); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.heart-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 8px; flex-shrink: 0;
  transition: color 0.2s, transform 0.15s;
}
.heart-btn.liked { color: var(--accent2); }
.heart-btn:active { transform: scale(0.78); }

/* Progress */
.progress-section { margin-bottom: 10px; }
.progress-wrap {
  height: 3px; background: rgba(255,255,255,0.1);
  border-radius: 2px; cursor: pointer; margin-bottom: 5px;
  touch-action: none; position: relative;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  position: relative; transition: width 0.2s linear;
}
.progress-fill::after {
  content: ''; position: absolute; right: -6px; top: 50%;
  transform: translateY(-50%) scale(0);
  width: 14px; height: 14px; background: #fff; border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: transform 0.18s;
}
.progress-wrap:hover .progress-fill::after,
.progress-wrap.dragging .progress-fill::after { transform: translateY(-50%) scale(1); }
.time-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: 500; color: var(--muted); }

/* Controls */
.main-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.ctrl-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.78);
  display: flex; align-items: center; justify-content: center;
  padding: 8px; border-radius: 50%;
  transition: color 0.15s, transform 0.12s, background 0.15s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.06); }
.ctrl-btn:active { transform: scale(0.84); }
.ctrl-btn.dim { color: var(--muted); }
.ctrl-btn.mode-on { color: var(--accent2); }
.play-btn {
  width: 60px; height: 60px;
  background: linear-gradient(145deg, var(--accent2), var(--accent));
  border-radius: 50%; color: #fff;
  box-shadow: 0 6px 22px rgba(220,30,60,0.45);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s !important;
}
.play-btn:hover { transform: scale(1.07) !important; box-shadow: 0 10px 32px rgba(220,30,60,0.55) !important; }
.play-btn:active { transform: scale(0.91) !important; }

/* Volume */
.volume-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.vol-icon { color: var(--muted); flex-shrink: 0; }
.vol-track { flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; touch-action: none; }
.vol-fill { height: 100%; background: rgba(255,255,255,0.5); border-radius: 2px; }

/* Bottom toolbar */
.bottom-row { display: flex; align-items: center; justify-content: space-between; }
.bottom-btn {
  background: none; border: none; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  padding: 7px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px; font-family: inherit;
  transition: color 0.2s, background 0.15s;
}
.bottom-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.bottom-btn.active { color: var(--text); }

.load-label {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: rgba(255,255,255,0.06);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6);
  cursor: pointer; font-family: inherit; transition: background 0.2s, color 0.2s;
}
.load-label:hover { background: rgba(255,255,255,0.1); color: var(--text); }
#fileInput { display: none; }

/* Queue */
.queue-panel { max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s; }
.queue-panel.open { max-height: 220px; opacity: 1; }
.queue-divider { height: 1px; background: var(--border); margin: 10px 0 8px; }
.queue-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.queue-list { overflow-y: auto; max-height: 180px; }
.queue-list::-webkit-scrollbar { width: 0; }
.queue-item { display: flex; align-items: center; gap: 12px; padding: 6px 4px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
.queue-item:hover { background: rgba(255,255,255,0.04); }
.queue-item.active { background: rgba(220,30,60,0.07); }
.qi-thumb { width: 34px; height: 34px; border-radius: 7px; overflow: hidden; flex-shrink: 0; background: var(--card2); border: 1px solid var(--border); }
.qi-thumb canvas { width: 34px; height: 34px; display: block; }
.qi-info { flex: 1; min-width: 0; }
.qi-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-item.active .qi-title { color: var(--accent2); }
.qi-artist { font-size: 11px; color: var(--muted); margin-top: 1px; }
.qi-dur { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; opacity: 0; flex-shrink: 0; }
.queue-item.active .eq-bars { opacity: 1; }
.eq-bar-sm { width: 3px; border-radius: 1.5px; background: var(--accent2); height: 4px; }
.queue-item.active.is-playing .eq-bar-sm { animation: eqB 0.5s ease infinite alternate; }
.eq-bar-sm:nth-child(2) { animation-delay: 0.17s; }
.eq-bar-sm:nth-child(3) { animation-delay: 0.34s; }
@keyframes eqB { from { height: 3px; } to { height: 14px; } }

/* ── EQ Panel (full-screen slide-up) ── */
.eq-panel {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  padding: calc(var(--st) + 20px) 24px calc(var(--sb) + 24px);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.eq-panel.open { transform: translateY(0); }

.eq-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.eq-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.eq-close {
  background: rgba(255,255,255,0.08); border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: background 0.2s;
}
.eq-close:hover { background: rgba(255,255,255,0.15); }

/* EQ enable toggle row */
.eq-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; margin-bottom: 22px;
  background: rgba(255,255,255,0.04); border-radius: 14px; border: 1px solid var(--border);
}
.eq-toggle-label { font-size: 14px; font-weight: 600; }
.toggle-switch {
  width: 46px; height: 27px; border-radius: 14px;
  background: var(--muted); cursor: pointer;
  position: relative; transition: background 0.25s; border: none; flex-shrink: 0;
}
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after {
  content: ''; position: absolute;
  width: 21px; height: 21px; border-radius: 50%; background: #fff;
  top: 3px; left: 3px;
  transition: transform 0.25s cubic-bezier(0.34,1.4,0.64,1);
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.toggle-switch.on::after { transform: translateX(19px); }

/* Presets */
.eq-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.preset-btn {
  padding: 6px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--sub); cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.preset-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.preset-btn.active { background: rgba(220,30,60,0.2); border-color: var(--accent); color: var(--accent2); }

/* Band sliders */
.eq-bands {
  display: flex; flex: 1; min-height: 0;
  align-items: center; justify-content: space-around;
  margin-bottom: 10px;
}
.eq-band { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
.eq-band-val { font-size: 11px; font-weight: 700; color: var(--accent2); min-width: 36px; text-align: center; }
.eq-slider-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 120px; }

input[type=range].eq-slider {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
  writing-mode: vertical-lr;
  direction: rtl;
  width: 32px;
  height: 120px;
  background: transparent;
  cursor: pointer;
  touch-action: none;
}
input[type=range].eq-slider::-webkit-slider-runnable-track {
  width: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.12);
}
input[type=range].eq-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(220,30,60,0.45), 0 2px 8px rgba(0,0,0,0.4);
  margin-left: -9px;
  transition: box-shadow 0.2s;
}
input[type=range].eq-slider:active::-webkit-slider-thumb {
  box-shadow: 0 0 0 6px rgba(220,30,60,0.35), 0 2px 8px rgba(0,0,0,0.4);
}
input[type=range].eq-slider::-moz-range-track { width: 4px; border-radius: 2px; background: rgba(255,255,255,0.12); }
input[type=range].eq-slider::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%; background: #fff; border: none;
  box-shadow: 0 0 0 3px rgba(220,30,60,0.45);
}

.eq-band-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; }
.eq-zero-line { width: 88%; height: 1px; background: rgba(255,255,255,0.07); margin: 0 auto 12px; }

/* Toast */
.toast {
  position: fixed; bottom: calc(20px + var(--sb)); left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(28,28,28,0.92); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
  padding: 9px 18px; font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.9); opacity: 0;
  transition: opacity 0.28s, transform 0.28s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="ambient">
  <div class="amb-blob amb1" id="blob1"></div>
  <div class="amb-blob amb2" id="blob2"></div>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="bp-logo">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <span class="header-title">BlackPlayer</span>
    </div>
    <div class="header-right">
      <button id="installBtn">＋ Install</button>
      <div class="more-btn"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Art -->
  <div class="art-container">
    <div class="art-glow" id="artGlow"></div>
    <div class="art-frame" id="artFrame">
      <canvas id="artCanvas"></canvas>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="track-info">
      <div class="track-text">
        <div class="track-name" id="trackName">No Track Loaded</div>
        <div class="track-artist" id="trackArtist">Tap "Add Music" to begin</div>
      </div>
      <button class="heart-btn" id="heartBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path id="heartPath" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <div class="progress-section">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="time-row"><span id="currentTime">0:00</span><span id="duration">—</span></div>
    </div>

    <div class="main-controls">
      <button class="ctrl-btn dim" id="shuffleBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="prevBtn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 20L9 12l10-8v16z"/><rect x="5" y="4" width="2.5" height="16" rx="1.2"/>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn">
        <svg id="playIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="nextBtn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5 4l10 8-10 8V4z"/><rect x="16.5" y="4" width="2.5" height="16" rx="1.2"/>
        </svg>
      </button>
      <button class="ctrl-btn dim" id="repeatBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <div class="volume-row">
      <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
      <div class="vol-track" id="volTrack"><div class="vol-fill" id="volFill" style="width:80%"></div></div>
      <svg class="vol-icon" width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="bottom-row">
      <button class="bottom-btn" id="queueToggle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/>
        </svg>
        Queue
      </button>

      <div style="display:flex;gap:5px;align-items:center;">
        <label class="load-label" for="fileInput" style="padding:7px 10px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Add
        </label>
        <input type="file" id="fileInput" accept="audio/*" multiple>
        <button class="load-label" id="syncFolderBtn" style="padding:7px 10px;cursor:pointer;border:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Sync
        </button>
      </div>

      <button class="bottom-btn" id="eqBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
          <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
          <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
          <line x1="17" y1="16" x2="23" y2="16"/>
        </svg>
        EQ
      </button>
    </div>

    <div class="queue-panel" id="queuePanel">
      <div class="queue-divider"></div>
      <div class="queue-label">Up Next</div>
      <div class="queue-list" id="queueList"></div>
    </div>
  </div>
</div>

<!-- EQ Panel -->
<div class="eq-panel" id="eqPanel">
  <div class="eq-header">
    <span class="eq-title">Equalizer</span>
    <button class="eq-close" id="eqClose">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="eq-toggle-row">
    <span class="eq-toggle-label">EQ Enabled</span>
    <button class="toggle-switch" id="eqToggle"></button>
  </div>

  <div class="eq-presets" id="eqPresets">
    <button class="preset-btn active" data-preset="flat">Flat</button>
    <button class="preset-btn" data-preset="bass">Bass Boost</button>
    <button class="preset-btn" data-preset="treble">Treble</button>
    <button class="preset-btn" data-preset="vocal">Vocal</button>
    <button class="preset-btn" data-preset="rock">Rock</button>
    <button class="preset-btn" data-preset="jazz">Jazz</button>
    <button class="preset-btn" data-preset="classical">Classical</button>
  </div>

  <div class="eq-bands" id="eqBands"></div>
  <div class="eq-zero-line"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Service Worker ───────────────────────────────────────
if ('serviceWorker' in navigator)
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn(e))
  );

// ── PWA Install ──────────────────────────────────────────
let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; });
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null; installBtn.style.display = 'none';
  if (outcome === 'accepted') showToast('BlackPlayer installed ✓');
});
window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; showToast('Installed ✓'); });

// ── Core state ───────────────────────────────────────────
const audio = new Audio();
audio.volume = 0.8;
let tracks = [], currentIndex = 0, isShuffled = false, repeatMode = 0;
let audioCtx, sourceNode, analyserNode, eqFilters = [], eqEnabled = false;
let artPhase = 0;

const palettes = [
  ['#dc1e3c','#ff6b35'],['#7c3aed','#dc1e3c'],['#0891b2','#7c3aed'],
  ['#059669','#0891b2'],['#d97706','#dc1e3c'],['#be185d','#7c3aed'],
  ['#1d4ed8','#0891b2'],['#dc2626','#9333ea'],
];

// EQ band config [frequency, label]
const EQ_BANDS = [[60,'60'],[250,'250'],[1000,'1K'],[4000,'4K'],[16000,'16K']];

const EQ_PRESETS = {
  flat:      [ 0,  0,  0,  0,  0],
  bass:      [ 8,  5,  0, -2, -3],
  treble:    [-3, -2,  0,  5,  8],
  vocal:     [-2,  2,  6,  3, -1],
  rock:      [ 5,  2, -1,  2,  5],
  jazz:      [ 4,  2,  0,  2,  4],
  classical: [ 4,  2,  0, -1, -2],
};

// ── Palette ──────────────────────────────────────────────
function setPalette(idx) {
  const [c1,c2] = palettes[idx % palettes.length];
  document.getElementById('artGlow').style.background = c1;
  document.getElementById('blob1').style.background   = c1;
  document.getElementById('blob2').style.background   = c2;
}
setPalette(0);

// ── Art canvas ───────────────────────────────────────────
const artCanvas = document.getElementById('artCanvas');
const artCtx    = artCanvas.getContext('2d');

function drawArt() {
  const W = artCanvas.offsetWidth  || 340;
  const H = artCanvas.offsetHeight || 340;
  artCanvas.width = W; artCanvas.height = H;
  const t = artPhase, playing = !audio.paused;
  const [c1,c2] = palettes[currentIndex % palettes.length];

  artCtx.fillStyle = '#0c0c0c'; artCtx.fillRect(0,0,W,H);

  [[c1,0.38,0,0],[c2,0.32,1.1,1.5]].forEach(([col,rr,px,py]) => {
    const x = W/2 + (playing ? Math.sin(t*0.55+px)*W*0.05 : 0);
    const y = H/2 + (playing ? Math.cos(t*0.45+py)*H*0.04 : 0);
    const r = Math.min(W,H)*rr + (playing ? Math.sin(t*0.7+px)*W*0.03 : 0);
    const g = artCtx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,col+'55'); g.addColorStop(1,'transparent');
    artCtx.fillStyle=g; artCtx.beginPath(); artCtx.arc(x,y,r,0,Math.PI*2); artCtx.fill();
  });

  artCtx.strokeStyle='rgba(255,255,255,0.022)'; artCtx.lineWidth=1;
  for(let x=0;x<W;x+=38){artCtx.beginPath();artCtx.moveTo(x,0);artCtx.lineTo(x,H);artCtx.stroke();}
  for(let y=0;y<H;y+=38){artCtx.beginPath();artCtx.moveTo(0,y);artCtx.lineTo(W,y);artCtx.stroke();}

  artCtx.save(); artCtx.translate(W/2,H/2);
  if(playing) artCtx.rotate(Math.sin(t*0.2)*0.05);
  if(playing){
    artCtx.beginPath();
    artCtx.arc(0,0,Math.min(W,H)*0.26+Math.sin(t*2)*4,0,Math.PI*2);
    artCtx.strokeStyle='rgba(255,255,255,0.05)'; artCtx.lineWidth=2; artCtx.stroke();
  }
  artCtx.fillStyle='rgba(255,255,255,0.88)';
  artCtx.font=`bold ${Math.floor(Math.min(W,H)*0.10)}px -apple-system`;
  artCtx.textAlign='center'; artCtx.textBaseline='middle';
  artCtx.fillText(playing?'♫':'♪',0,0);
  artCtx.restore();

  if(playing) artPhase+=0.016;
  requestAnimationFrame(drawArt);
}
drawArt();

// ── Audio context + EQ chain ─────────────────────────────
function setupAudioCtx() {
  if (audioCtx) { if (audioCtx.state==='suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  sourceNode   = audioCtx.createMediaElementSource(audio);
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;

  eqFilters = EQ_BANDS.map(([freq]) => {
    const f = audioCtx.createBiquadFilter();
    f.type = 'peaking'; f.frequency.value = freq; f.Q.value = 1.4; f.gain.value = 0;
    return f;
  });

  let prev = sourceNode;
  eqFilters.forEach(f => { prev.connect(f); prev = f; });
  prev.connect(analyserNode);
  analyserNode.connect(audioCtx.destination);

  buildEqUI();
}

// ── EQ UI ────────────────────────────────────────────────
function buildEqUI() {
  const container = document.getElementById('eqBands');
  container.innerHTML = '';
  EQ_BANDS.forEach(([freq,label],i) => {
    const band = document.createElement('div');
    band.className = 'eq-band';
    band.innerHTML = `
      <div class="eq-band-val" id="eqVal${i}">0dB</div>
      <div class="eq-slider-wrap">
        <input type="range" class="eq-slider" id="eqSlider${i}"
          min="-12" max="12" step="0.5" value="0">
      </div>
      <div class="eq-band-label">${label}Hz</div>`;
    container.appendChild(band);

    document.getElementById(`eqSlider${i}`).addEventListener('input', function() {
      const v = parseFloat(this.value);
      document.getElementById(`eqVal${i}`).textContent = (v>=0?'+':'')+v+'dB';
      if (eqFilters[i]) eqFilters[i].gain.value = eqEnabled ? v : 0;
      // deselect preset when manually adjusted
      document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    });
  });
}

function applyEqGains() {
  eqFilters.forEach((f,i) => {
    const s = document.getElementById(`eqSlider${i}`);
    f.gain.value = eqEnabled && s ? parseFloat(s.value) : 0;
  });
}

document.getElementById('eqToggle').addEventListener('click', function() {
  eqEnabled = !eqEnabled;
  this.classList.toggle('on', eqEnabled);
  applyEqGains();
  showToast(eqEnabled ? 'EQ on' : 'EQ bypassed');
});

document.getElementById('eqPresets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  const gains = EQ_PRESETS[btn.dataset.preset];
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  gains.forEach((g,i) => {
    const s = document.getElementById(`eqSlider${i}`);
    const v = document.getElementById(`eqVal${i}`);
    if(s) s.value = g;
    if(v) v.textContent = (g>=0?'+':'')+g+'dB';
    if(eqFilters[i]) eqFilters[i].gain.value = eqEnabled ? g : 0;
  });
  showToast('Preset: '+btn.textContent);
});

document.getElementById('eqBtn').addEventListener('click', () => {
  setupAudioCtx();
  document.getElementById('eqPanel').classList.add('open');
});
document.getElementById('eqClose').addEventListener('click', () =>
  document.getElementById('eqPanel').classList.remove('open')
);

// ── File loading ─────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const wasEmpty = !tracks.length;
  tracks = [...tracks, ...files.map(f => ({
    url: URL.createObjectURL(f),
    title: f.name.replace(/\.[^.]+$/,''),
    artist: 'Local File', duration: '—'
  }))];
  if (wasEmpty) loadTrack(0);
  renderQueue();
  showToast(`${files.length} track${files.length>1?'s':''} added`);
  e.target.value = '';
});

function loadTrack(idx) {
  if (!tracks.length) return;
  currentIndex = ((idx % tracks.length)+tracks.length) % tracks.length;
  const t = tracks[currentIndex];
  audio.src = t.url; audio.load();
  document.getElementById('trackName').textContent   = t.title;
  document.getElementById('trackArtist').textContent = t.artist;
  document.getElementById('currentTime').textContent  = '0:00';
  document.getElementById('duration').textContent     = t.duration!=='—'?t.duration:'—';
  document.getElementById('progressFill').style.width = '0%';
  setPalette(currentIndex); renderQueue();
  audio.addEventListener('loadedmetadata', () => {
    const d = fmt(audio.duration);
    tracks[currentIndex].duration = d;
    document.getElementById('duration').textContent = d;
    renderQueue();
  }, { once:true });
}

// ── Playback ─────────────────────────────────────────────
function playPause() {
  if (!tracks.length) { showToast('Add music first'); return; }
  setupAudioCtx();
  audio.paused ? audio.play() : audio.pause();
}

audio.addEventListener('play', () => {
  document.getElementById('playIcon').innerHTML =
    '<rect x="6" y="4" width="4" height="16" rx="1.5"/><rect x="14" y="4" width="4" height="16" rx="1.5"/>';
  document.getElementById('artFrame').classList.add('playing');
  renderQueue(); syncMediaSession();
});
audio.addEventListener('pause', () => {
  document.getElementById('playIcon').innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  document.getElementById('artFrame').classList.remove('playing');
  renderQueue(); syncMediaSession();
});
audio.addEventListener('timeupdate', () => {
  document.getElementById('currentTime').textContent = fmt(audio.currentTime);
  if (audio.duration) {
    document.getElementById('progressFill').style.width = (audio.currentTime/audio.duration*100)+'%';
    // Sync playback position to lock screen / notification
    if ('mediaSession' in navigator && navigator.mediaSession.setPositionState) {
      try {
        navigator.mediaSession.setPositionState({
          duration:     audio.duration,
          playbackRate: audio.playbackRate,
          position:     audio.currentTime,
        });
      } catch {}
    }
  }
});
audio.addEventListener('ended', () => {
  if (repeatMode===2) { audio.currentTime=0; audio.play(); return; }
  const next = isShuffled
    ? Math.floor(Math.random()*tracks.length)
    : (currentIndex+1)%tracks.length;
  if (repeatMode===1 || currentIndex<tracks.length-1 || isShuffled) { loadTrack(next); audio.play(); }
});

// ── Media Session — full sync ────────────────────────────
function syncMediaSession() {
  if (!('mediaSession' in navigator) || !tracks.length) return;
  const t = tracks[currentIndex];

  navigator.mediaSession.metadata = new MediaMetadata({
    title: t.title, artist: t.artist, album: 'BlackPlayer',
    artwork: [
      { src:'icons/icon-192x192.png', sizes:'192x192', type:'image/png' },
      { src:'icons/icon-512x512.png', sizes:'512x512', type:'image/png' },
    ]
  });
  navigator.mediaSession.playbackState = audio.paused ? 'paused' : 'playing';

  const handlers = {
    play:          () => { setupAudioCtx(); audio.play(); },
    pause:         () => audio.pause(),
    stop:          () => { audio.pause(); audio.currentTime = 0; },
    previoustrack: () => { loadTrack(currentIndex-1); audio.play(); },
    nexttrack:     () => { loadTrack(currentIndex+1); audio.play(); },
    seekbackward:  ({seekOffset}) => { audio.currentTime = Math.max(0, audio.currentTime-(seekOffset||10)); },
    seekforward:   ({seekOffset}) => { audio.currentTime = Math.min(audio.duration, audio.currentTime+(seekOffset||10)); },
    seekto:        ({seekTime})   => { audio.currentTime = seekTime; },
  };
  Object.entries(handlers).forEach(([a,h]) => { try { navigator.mediaSession.setActionHandler(a,h); } catch {} });
}

// ── Controls ─────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', playPause);
document.getElementById('prevBtn').addEventListener('click', () => {
  if (audio.currentTime>3) { audio.currentTime=0; return; }
  loadTrack(currentIndex-1);
  if (!audio.paused) { setupAudioCtx(); audio.play(); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  loadTrack(isShuffled ? Math.floor(Math.random()*tracks.length) : currentIndex+1);
  if (!audio.paused) { setupAudioCtx(); audio.play(); }
});
document.getElementById('shuffleBtn').addEventListener('click', function() {
  isShuffled=!isShuffled;
  this.classList.toggle('mode-on',isShuffled); this.classList.toggle('dim',!isShuffled);
  showToast(isShuffled?'Shuffle on':'Shuffle off');
});
document.getElementById('repeatBtn').addEventListener('click', function() {
  repeatMode=(repeatMode+1)%3;
  this.classList.toggle('mode-on',repeatMode>0); this.classList.toggle('dim',repeatMode===0);
  showToast(['Repeat off','Repeat all','Repeat one'][repeatMode]);
});
document.getElementById('heartBtn').addEventListener('click', function() {
  this.classList.toggle('liked');
  const p=document.getElementById('heartPath'), liked=this.classList.contains('liked');
  p.setAttribute('fill',liked?'#ff3b5c':'none'); p.setAttribute('stroke',liked?'#ff3b5c':'currentColor');
  if(liked) showToast('Added to favourites');
});
document.getElementById('queueToggle').addEventListener('click', function() {
  document.getElementById('queuePanel').classList.toggle('open'); this.classList.toggle('active');
});

// ── Progress ─────────────────────────────────────────────
const progressWrap = document.getElementById('progressWrap');
function seekTo(e) {
  if (!audio.duration) return;
  const r = progressWrap.getBoundingClientRect();
  const x = (e.touches?e.touches[0].clientX:e.clientX)-r.left;
  audio.currentTime = Math.max(0,Math.min(1,x/r.width))*audio.duration;
}
progressWrap.addEventListener('click', seekTo);
progressWrap.addEventListener('touchstart', e=>{progressWrap.classList.add('dragging');seekTo(e);},{passive:true});
progressWrap.addEventListener('touchmove', seekTo,{passive:true});
progressWrap.addEventListener('touchend', ()=>progressWrap.classList.remove('dragging'));

// ── Volume ────────────────────────────────────────────────
const volTrack = document.getElementById('volTrack');
function setVol(e) {
  const r=volTrack.getBoundingClientRect();
  const v=Math.max(0,Math.min(1,((e.touches?e.touches[0].clientX:e.clientX)-r.left)/r.width));
  audio.volume=v; document.getElementById('volFill').style.width=(v*100)+'%';
}
volTrack.addEventListener('click',setVol);
volTrack.addEventListener('touchstart',setVol,{passive:true});
volTrack.addEventListener('touchmove',setVol,{passive:true});

// ── Queue ─────────────────────────────────────────────────
function renderQueue() {
  const list = document.getElementById('queueList');
  list.innerHTML='';
  tracks.forEach((t,i) => {
    const isActive=i===currentIndex, isPlaying=isActive&&!audio.paused;
    const item=document.createElement('div');
    item.className='queue-item'+(isActive?' active':'')+(isPlaying?' is-playing':'');
    item.innerHTML=`
      <div class="qi-thumb"><canvas id="qt-${i}" width="34" height="34"></canvas></div>
      <div class="qi-info">
        <div class="qi-title">${esc(t.title)}</div>
        <div class="qi-artist">${esc(t.artist)}</div>
      </div>
      ${isActive
        ?`<div class="eq-bars"><div class="eq-bar-sm"></div><div class="eq-bar-sm"></div><div class="eq-bar-sm"></div></div>`
        :`<span class="qi-dur">${t.duration}</span>`}`;
    item.addEventListener('click',()=>{loadTrack(i);setupAudioCtx();audio.play();});
    list.appendChild(item);
    requestAnimationFrame(()=>{
      const c=document.getElementById(`qt-${i}`);if(!c)return;
      const ctx=c.getContext('2d'),[c1,c2]=palettes[i%palettes.length];
      ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,34,34);
      const g=ctx.createRadialGradient(17,17,0,17,17,20);
      g.addColorStop(0,c1+'88');g.addColorStop(1,c2+'44');
      ctx.fillStyle=g;ctx.fillRect(0,0,34,34);
      ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='bold 15px -apple-system';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('♪',17,17);
    });
  });
}

// ── Toast ─────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2200);
}


// ── Auto-sync folder (File System Access API) ─────────────
let syncDirHandle = null;
let syncInterval  = null;
const AUDIO_EXTS  = ['mp3','mp4','m4a','ogg','opus','flac','wav','aac','webm','wma'];

document.getElementById('syncFolderBtn').addEventListener('click', async () => {
  if (!('showDirectoryPicker' in window)) {
    showToast('Folder sync not supported in this browser');
    return;
  }
  try {
    syncDirHandle = await window.showDirectoryPicker({ mode: 'read' });
    showToast('Syncing folder…');
    await syncFolder();
    // Re-scan every 30 seconds for new files
    clearInterval(syncInterval);
    syncInterval = setInterval(syncFolder, 30000);
    document.getElementById('syncFolderBtn').style.color = 'var(--accent2)';
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Could not open folder');
  }
});

async function syncFolder() {
  if (!syncDirHandle) return;
  const newTracks = [];
  try {
    for await (const [name, handle] of syncDirHandle.entries()) {
      if (handle.kind !== 'file') continue;
      const ext = name.split('.').pop().toLowerCase();
      if (!AUDIO_EXTS.includes(ext)) continue;
      // Skip if already loaded
      const title = name.replace(/\.[^\.]+$/, '');
      if (tracks.some(t => t.title === title)) continue;
      const file = await handle.getFile();
      newTracks.push({
        url:      URL.createObjectURL(file),
        title:    title,
        artist:   'Local File',
        duration: '—'
      });
    }
  } catch (e) {
    showToast('Sync error — folder may have moved');
    clearInterval(syncInterval);
    return;
  }

  if (newTracks.length === 0) return;

  const wasEmpty = !tracks.length;
  tracks = [...tracks, ...newTracks];
  if (wasEmpty) loadTrack(0);
  renderQueue();
  showToast(`${newTracks.length} new track${newTracks.length > 1 ? 's' : ''} synced`);
}

function fmt(s) { if(!isFinite(s))return'0:00'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
